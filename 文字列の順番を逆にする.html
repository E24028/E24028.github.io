<!DOCTYPE html>
<html>
<head>
<title></title>
<style>
html, body
{
    margin: 0px;
    border: 0px;
    padding: 0px;
    width: 100%;
    font-family: monospace;
    font-size: 20px;
}

.center
{
    text-align: center;
    margin: none;
}

.textarea
{
    width: 50%;
    height: 30vw;
    resize: none;
}

.container
{
    display: flex;
}

.output
{
    width: 50%;
    overflow: auto;
    height: 30vw;
    /* white-space: pre-wrap; */
    overflow-wrap: break-word;

    border: 1px;
    border-color: orange;
    border-style: solid;
    border-radius: 7px;

    background-color: lightyellow;
    margin: 0px;
}

.button
{
    width: 50%;
    height: 2em;
}

.Checkbox
{
    zoom: 140%;
}
</style>
</head>
<body>
<h1 class="center">文字列の順番を逆にする</h1>
<p class="center">順番を逆にした文字列を生成します。</p>

<div class="container">
    <textarea class="textarea" id="input" oninput="Input()" placeholder="ここにテキストを入力してください..."></textarea>
    <pre class="output" id="output"></pre>
</div>

<div class="container">
    <button class="button" onclick="Input()">決定</button>
    <button class="button" onclick="clipboard()">コピー</button>
</div>

<script>
function Input()
{
    var Input = document.getElementById('input');
    var Output = document.getElementById('output');

    var InputValue = '';
    var Value = '';

    for (let i = 0; i < Input.value.length; i++)
    {
        InputValue = Input.value.charAt(i);

        Value = InputValue + Value;
    }

    Output.innerText = Value;
}

function clipboard()
{
    const Output = document.getElementById('output');
    navigator.clipboard.writeText(Output.innerText);
    alert('copied! text: ' + Output.innerText);
}
</script>
</body>
</html>
