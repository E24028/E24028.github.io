<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title id="title">開発者ブログ2</title>
<style>
html
{
    width: 100%;
    height: 100%;
}

body[darkmode="false"]
{
    --color: rgb(0, 0, 0);
    --input-border: rgb(127, 127, 127);
    --button-border: rgb(148, 148, 148);
    --button-border-selected: rgb(98, 98, 98);
    --input-bg: rgb(255, 255, 255);
    --button-bg: rgb(239, 239, 239);
    --button-bg-selected: rgb(190, 190, 190);
    --body-bg-color: rgb(255, 255, 223);
    --header-bg-color: rgb(191, 255, 255);
    --main-bg-color: rgb(223, 255, 223);
    --footer-bg-color: rgb(255, 255, 245);
    --item-bg-color: rgb(191, 255, 191);
    --item-bg-color-selected: rgb(171, 235, 171);
    --item-border-color: rgb(127, 255, 127);
    --link-color: rgb(0, 0, 255);
    --link-color-selected: rgb(0, 0, 191);
}

body[darkmode="true"]
{
    --color: rgb(255, 255, 255);
    --input-border: rgb(127, 127, 127);
    --button-border: rgb(105, 105, 105);
    --button-border-selected: rgb(155, 155, 155);
    --input-bg: rgb(0, 0, 0);
    --button-bg: rgb(15, 15, 15);
    --button-bg-selected: rgb(65, 65, 65);
    --body-bg-color: rgb(81, 81, 50);
    --header-bg-color: rgb(50, 113, 113);
    --main-bg-color: rgb(50, 81, 50);
    --footer-bg-color: rgb(60, 60, 50);
    --item-bg-color: rgb(50, 113, 50);
    --item-bg-color-selected: rgb(70, 133, 70);
    --item-border-color: rgb(50, 177, 50);
    --link-color: rgb(0, 0, 191);
    --link-color-selected: rgb(0, 0, 255);
}

body
{
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    background-color: var(--body-bg-color);
    margin: 8px;
    color: var(--color);
}

#header
{
    height: 70px;
    overflow: auto;
    background-color: var(--header-bg-color);
    text-align: center;
}

h1
{
    margin-top: 10px;
    margin-bottom: 10px;
}

#main
{
    height: calc(100% - 140px);
    background-color: var(--main-bg-color);
    overflow-y: scroll;
}

#footer
{
    height: 70px;
    background-color: var(--footer-bg-color);
    overflow: auto;
}

#copyRight
{
    text-align: center;
    margin-top: 10px;
    margin-bottom: 10px;
}

#Jump
{
    text-align: center;
}

.Rotate
{
    transform: rotateZ(180deg);
    display: inline-block;
}

.short-margin
{
    margin-top: 5px;
    margin-bottom: 5px;
}

.blog-item
{
    margin: 10px;
    padding: 5px;
    border-radius: 5px;
    background-color: var(--item-bg-color);
    border: 1px solid var(--item-border-color);
    overflow: auto;
}

.blog-item:hover, .blog-item:focus
{
    margin: 10px;
    padding: 5px;
    border-radius: 5px;
    background-color: var(--item-bg-color-selected);
    border: 1px solid var(--item-border-color);
    overflow: auto;
}

a
{
    color: var(--link-color);
}

a:hover, a:focus
{
    color: var(--link-color-selected);
}
    
input[type="number"]
{
    text-align: center;
    width: 80px;
    background-color: var(--input-bg);
    color: var(--color);
    padding: 1px;
    border: 1px solid var(--input-border);
    border-radius: 4px;
}

button
{
    background-color: var(--button-bg);
    color: var(--color);
    padding: 1px;
    border: 1px solid var(--button-border);
    border-radius: 4px;
}
    
button:hover, button:focus
{
    background-color: var(--button-bg-selected);
    color: var(--color);
    padding: 1px;
    border: 1px solid var(--button-border-selected);
    border-radius: 4px;
}
</style>
</head>
<body darkmode="false">
<div id="header">
    <h1 id="h1">開発者ブログ</h1>
</div>

<div id="main"></div>

<div id="footer">
    <div id="Jump">
        <input type="number" id="pageJump" placeholder="0" onkeypress="key(event)">
        <span>ページ</span>
        <button onclick="jump()">ジャンプ</button>
        <span>/</span>
        <button onclick="dark()" id="darkButton">ダークモードにする</button>
    </div>
    <div id="copyRight">
        <span>©</span>
        <span>2026 E24028.github.io / All rights reserved</span>
    </div>
</div>

<script src="https://E24028.github.io/URL操作.js"></script>
<script src="https://E24028.github.io/ブログエンジン.js"></script>

<script>
let main = document.getElementById('main');
let title = document.getElementById('title');
const defaultTitle = title.innerText;
let currentIndex = Number(getParams('page')) - 1;
let pageJump = document.getElementById('pageJump');
let darkButton = document.getElementById('darkButton');
let body = document.body;

// パラメータが存在し、かつ該当するデータがある場合
if (currentIndex !== null && blogData[currentIndex])
{
    const data = blogData[currentIndex];
    renderDetail(data);
} else {
    setParams(['page', '']);

    // indexがない、または不正な場合は「ホーム（一覧）」を表示
    renderList();
}

let param = getParams('dark') || 'false';
body.setAttribute('darkmode', param);
setParams(['dark', param]);
darkButton.innerText = (param == 'true') ? 'ライトモードにする' : 'ダークモードにする';

// 一覧表示（ホーム）用関数
function renderList()
{
    main.innerHTML = ''; //<h2>記事一覧</h2>
    blogData.toReversed().forEach(
        (data) => {
            let element = document.createElement('a');
            element.setAttribute('onclick', `jumpTo(event, ${data.index + 1})`);
            element.setAttribute('href', "#");
            element.innerHTML = `
                <div class="blog-item">
                    <span>${data.index + 1}. ${data.title}</span> - <span>${data.day}</span>
                </div>
            `;

            main.appendChild(element);
        }
    );

    title.innerText = `ホーム - ${defaultTitle}`;
}

// 詳細表示用関数
function renderDetail(data)
{
    main.innerHTML = `
        <a onclick="jumpTo(event, 0)" href="#">≪ 戻る</a>
        <h2 class="short-margin">${data.title}</h2>
        <small>- ${data.day}</small>
        <hr>
        <div>${data.data || "内容がありません。"}</div>
    `;
    pageJump.value = data.index + 1;
    title.innerText = `${data.title} - ${defaultTitle}`;
}

function key(keyBoardEvent)
{
    if (keyBoardEvent.key === 'Enter')
    {
        jump();
    }
}

function jump()
{
    setParams(['page', pageJump.value]);
    window.location.reload();
}

function jumpTo(e, n)
{
    e.preventDefault();
    setParams(['page', n]);
    window.location.reload();
}

function dark()
{
    if (body.getAttribute('darkmode') == 'true')
    {
        body.setAttribute('darkmode', 'false');
        setParams(['dark', 'false']);
        darkButton.innerText = 'ダークモードにする';
    } else {
        body.setAttribute('darkmode', 'true');
        setParams(['dark', 'true']);
        darkButton.innerText = 'ライトモードにする';
    }
}
</script>
</body>
</html>
