<!DOCTYPE html>
<html lang="ja">
<head>
<title id="title">開発者ブログ2</title>
<style>
html
{
    width: 100%;
    height: 100%;
}

body
{
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    background-color: rgb(255, 255, 223);
}

#header
{
    height: 70px;
    overflow: auto;
    background-color: rgb(191, 255, 255);
    text-align: center;
}

h1
{
    margin-top: 10px;
    margin-bottom: 10px;
}

#main
{
    height: calc(100% - 120px);
    background-color: rgb(223, 255, 223);
    overflow-y: scroll;
}

#footer
{
    height: 50px;
    background-color: rgb(255, 255, 245);
    overflow: auto;
}

#copyRight
{
    text-align: center;
    margin-top: 10px;
    margin-bottom: 10px;
}

.Rotate
{
    transform: rotateZ(180deg);
    display: inline-block;
}

.short-margin
{
    margin-top: 5px;
    margin-bottom: 5px;
}

.blog-item
{
    margin-bottom: 10px;
    padding: 5px;
    border-bottom: 1px solid #ccc;
    cursor: pointer;
}

a
{
    color: rgb(0, 0, 255);
}
</style>
</head>
<body>
<div id="header">
    <h1 id="h1">開発者ブログ</h1>
</div>

<div id="main"></div>

<div id="footer">
    <div id="copyRight">
        <span>©</span>
        <span>E24028.github.io / reserved</span>
    </div>
</div>

<script src="https://E24028.github.io/URL操作.js"></script>
<script src="https://E24028.github.io/ブログエンジン.js"></script>

<script>
let main = document.getElementById('main');
let title = document.getElementById('title');
const defaultTitle = title.innerText;
let currentIndex = getParams('index');

// indexパラメータが存在し、かつ該当するデータがある場合
if (currentIndex !== null && blogData[currentIndex])
{
    const data = blogData[currentIndex];
    renderDetail(data);
} else {
    // indexがない、または不正な場合は「ホーム（一覧）」を表示
    renderList();
}

// 一覧表示（ホーム）用関数
function renderList()
{
    main.innerHTML = '<h2>記事一覧</h2>';
    blogData.forEach(
        (data) => {
            let element = document.createElement('div');
            element.className = 'blog-item';

            element.innerHTML = `
                <a href="?index=${data.index}">
                    <span>${data.index + 1}. ${data.title}</span> - <span>${data.day}</span>
                </a>
            `;

            main.appendChild(element);
        }
    );
}

// 詳細表示用関数
function renderDetail(data)
{
    main.innerHTML = `
        <a href="?">≪ 戻る</a>
        <h2 class="short-margin">${data.title}</h2>
        <small>- ${data.day}</small>
        <hr>
        <div>${data.data || "内容がありません。"}</div>
    `;
    title.innerText = `${data.title} - ${defaultTitle}`;
}
</script>
</body>
</html>
