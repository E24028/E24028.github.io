<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Gmail送信</title>
<style>
html, form
{
    width: 100%;
    height: 100%;
}

body
{
    width: calc(100% - 16px);
    height: calc(100% - 16px);
}

h1
{
    margin: 0px;
    width: 100%;
    text-align: center;
}

#to, #subject
{
    width: calc(100% - 120px)
}

.container
{
    display: flex;
    width: 100%;
}

.main
{
    height: calc(100% - 200px);
    margin-bottom: 10px;
}

.wide
{
    width: 100%;
}

#htmlText
{
    resize: none;
    width: 100%;
    height: calc(100% - 4px);
    border: 1px solid black;
}

#frame
{
    width: 100%;
    height: 100%;
    border: 1px solid black;
    font-size: 15px;
}
</style>
</head>
<body oninput="onInput()" onload="onLoad()">
<form action="https://script.google.com/macros/s/AKfycbxQ-uMDGovHi3c66Bp5MEMR2mNGhPXVsSxvq253nbVPvlw9g_nc2tkrHnEPIbKdO-hH/exec" method="POST">
    <h1>Gmail 送信</h1>
    <label for="to">宛先：</label>
    <input type="text" id="to" name="to" placeholder="宛先を入力…（カンマで区切って複数選択）" required>
    <p></p>

    <label for="subject">件名：</label>
    <input type="text" id="subject" name="subject" placeholder="メールの件名を入力…" required>
    <p></p>

    <div class="container">
        <div class="wide">内容：</div>
        <div class="wide">プレビュー：</div>
    </div>

    <div class="container main">
        <textarea id="htmlText" name="htmlText" placeholder="メールの内容をHTMLで入力…" oninput="loadFrame()"></textarea>
        <div id="frame"></div>
    </div>

    <button type="submit" id="submit" onclick="onClick()">送信</button>
</form>
<script src="https://e24028.github.io/URL操作.js"></script>
<script>
let $ = (id) => {
    return document.getElementById(id);
}

let input = $('htmlText');
let frame = $('frame');
let to = $('to');
let subject = $('subject');
let submit = $('submit');

function onLoad()
{
    to.value = getParams('to') || '';
    subject.value = getParams('subject') || '';
    input.value = getParams('text') || '';
    loadFrame();
    submit.disabled = false;
}

function onInput()
{
    setParams(['to', to.value], ['subject', subject.value], ['text', input.value]);
}

function loadFrame()
{
    frame.innerHTML = input.value;
}

function onClick()
{
    if (to.value && subject.value)
    {
        setTimeout(
            () => {
                submit.disabled = true;
            },
        100);

        setTimeout(
            () => {
                submit.disabled = false;
            },
        5000);
    }
}
</script>
</body>
</html>
