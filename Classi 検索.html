<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0;">
    <title>Classi 検索</title>
    <style>
        body
        {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
            font-size: 30px;
        }
        .container
        {
            margin-top: 50px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: inline-block;
            background-color: #f9f9f9;
            width:80%;
        }
        input[type="text"]
        {
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size:30px;
            text-align:center;
        }
        button
        {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size:30px;
        }
        button:hover
        {
            background-color: #0056b3;
        }
        p#message
        {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Classi 検索</h2>
        <p>Classi を検索します。</p>
        <p>Classi のすべてのグループ</p>

        <input type="text" id="ClassiSearchInput" placeholder="キーワード" onkeypress="handleKeyPress(event)">

        <p></p>
        <input type="text" id="ClassiSearchInputUser" placeholder="投稿者" onkeypress="handleKeyPress(event)">

        <p></p>
        <button onclick="search()">検索</button>
        <p id="message"></p>
    </div>

    <script>
        function search()
        {
            const ClassiSearch = document.getElementById('ClassiSearchInput').value.trim();
            const ClassiSearchUser = document.getElementById('ClassiSearchInputUser').value.trim();
            const messageElement = document.getElementById('message');

            if (ClassiSearch || ClassiSearchUser) {
                const baseURL = "https://platform.classi.jp/group2/search/result/?keyword=";
                const baseURLUser = "&userName=";
                const URL = baseURL + ClassiSearch + baseURLUser + ClassiSearchUser;

                // 新しいタブで開く
                window.open(URL, '_blank');
                messageElement.textContent = ""; // エラーメッセージをクリア
            } else {
                messageElement.textContent = "検索を入力してください。";
            }
        }

        // Enterキーが押されたかを判定する関数
        function handleKeyPress(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                search();
            }
        }
    </script>
</body>
</html>
