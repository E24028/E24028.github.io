<script>
// --- 定数・エンドポイントの設定 ---
const API_URL = 'https://script.google.com/macros/s/AKfycbw9HNyXA1v8FhPQHQulED5OqrUTuiUTymUeKde_-H-0A4UPfTCtcHvm6Csvj6JqjVP7/exec?docId=13c310_cji5gSp30eX0-Kq2hCCSRdROdYjaveZhFYLDE';

// アプリ内ステート
let state = {
    user: {
        name: '',
        email: '',
        notification: true
    },
    rooms: {}, // スレッドのデータ構造 { "スレッド名": [ {id, name, text, time, quote: {author, text}} ] }
    users: {}, // ★追加: { "ユーザー名": ["メールアドレス", "通知設定"] } の構造を保持
    currentRoom: '',
    quoteState: null, // 現在保持している引用データ { author, text }
    editingMessageId: null, // 現在編集中の投稿ID
    isFetching: false
};

// --- ライフサイクル・初期化 ---
function onLoad()
{
    // ローカルストレージからログイン情報をロード
    const savedUser = localStorage.getItem('chat_user');
      
    if (savedUser)
    {
        try
        {
            const parsed = JSON.parse(savedUser);

            // ステートへの代入
            state.user = {
                name: parsed.name || '',
                email: parsed.email || '',
                notification: parsed.notification !== undefined ? parsed.notification : true
            };

            // ログインフォームへの値自動補填
            document.getElementById('usernameInput').value = state.user.name;
            document.getElementById('userEmailInput').value = state.user.email;
            document.getElementById('notificationToggle').checked = state.user.notification;

            // ユーザー名とアドレスがどちらも存在すれば自動でログイン・入室状態にする
            if (state.user.name && state.user.email)
            {
                document.getElementById('currentUsername').innerText = state.user.name;
                document.getElementById('currentUserEmail').innerText = state.user.email;
                document.getElementById('userAvatar').innerText = state.user.name.charAt(0).toUpperCase();
                document.getElementById('loginModal').classList.add('hidden');
                updateNotificationIcon();

                // APIからデータ取得開始
                a();
            } else {
                // 自動ログインしない場合は、プルダウンを構築するためにデータを初回取得する
                fetchData();
            }
        } catch (e) {
            console.error("ユーザー情報の読み込み失敗", e);
        }
    }
}
// タブの切り替え制御
function switchLoginTab(tab)
{
    const tabSelect = document.getElementById('loginTabSelect');
    const tabNew = document.getElementById('loginTabNew');
    const btnSelect = document.getElementById('tabSelectBtn');
    const btnNew = document.getElementById('tabNewBtn');

    if (tab === 'select')
    {
        tabSelect.classList.remove('hidden');
        tabNew.classList.add('hidden');
        btnSelect.className = "flex-1 pb-2 border-b-2 border-blue-600 text-blue-600";
        btnNew.className = "flex-1 pb-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700";
        updateUserDropdown(); // プルダウンを最新化
    } else {
        tabSelect.classList.add('hidden');
        tabNew.classList.remove('hidden');
        btnSelect.className = "flex-1 pb-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700";
        btnNew.className = "flex-1 pb-2 border-b-2 border-blue-600 text-blue-600";
    }
}

// 登録済みユーザーのセレクトボックスを生成する
function updateUserDropdown()
{
    const dropdown = document.getElementById('userSelectDropdown');
    dropdown.innerHTML = '<option value="">-- ユーザーを選択してください --</option>';

    if (state.users && Object.keys(state.users).length > 0)
    {
        for (const username of Object.keys(state.users))
        {
            const opt = document.createElement('option');
            opt.value = username;
            opt.innerText = username;
            dropdown.appendChild(opt);
        }
    }
}

// ユーザー選択でログインしたときの処理
function handleSelectLogin()
{
    const dropdown = document.getElementById('userSelectDropdown');
    const selectedUsername = dropdown.value;

    if (!selectedUsername)
    {
        showToast('ユーザーを選択してください。', 'error');
        return;
    }

    // state.users から該当ユーザーの情報を取得
    const userData = state.users[selectedUsername];
    const email = userData[0];
    const notification = userData[1];

    // ログイン処理を実行
    executeLoginProcess(selectedUsername, email, notification);
}

// 共通ログイン処理（既存のコードから分離）
function executeLoginProcess(name, email, notification)
{
    state.user = { name, email, notification };

// --- ログイン処理 ---
function handleLogin()
{
    const usernameInput = document.getElementById('usernameInput');
    const emailInput = document.getElementById('userEmailInput');
    const name = usernameInput.value.trim();
    const email = emailInput.value.trim();
    const notification = document.getElementById('notificationToggle').checked;

    if (!name)
    {
        showToast('ユーザー名を入力してください。', 'error');
        return;
    }

    // すでに存在するユーザー名との重複チェックを追加
    if (state.users && state.users[name])
    {
        showToast('そのユーザー名はすでに登録されています。「登録済みユーザー」から選択するか、別の名前を入力してください。', 'error');
        return;
    }

    if (!email)
    {
        showToast('メールアドレスを入力してください。', 'error');
        return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    {
        showToast('有効なメールアドレス形式で入力してください。', 'error');
        return;
    }

    // ★以下、共通関数を呼び出すようにスッキリ修正
    executeLoginProcess(name, email, notification);
}

// --- API通信処理 (GET / POST) ---

// データ全取得 (GETリクエスト)
async function fetchData()
{
    if (state.isFetching)
    {
        return;
    }

    setLoadingState(true);

    try
    {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('APIからのデータ取得に失敗しました');

        const data = await response.json();

        // --- データベース破壊（[object Object]）の検知ロジック ---
        let isCorrupt = false;
        if (data && typeof data === 'object')
        {
            if (data.hasOwnProperty('content') && (data.content === '[object Object]' || String(data.content).includes('Object')))
            {
                isCorrupt = true;
            }

            if (data.hasOwnProperty('text') && (data.text === '[object Object]' || String(data.text).includes('Object')))
            {
                isCorrupt = true;
            }
        } else if (typeof data === 'string' && (data === '[object Object]' || data.includes('Object'))) {
            isCorrupt = true;
        }

        if (isCorrupt)
        {
            document.getElementById('dbWarningBar').classList.remove('hidden');
            showToast('データベースの破損を検知しました。自動修復をおすすめします。', 'error');
            updateSyncStatus(false, 'データ破損');

            state.rooms = { 'メインルーム': [] };
            state.users = {}; // ★追加
            state.currentRoom = 'メインルーム';
            renderRooms();
            renderMessages();
            return;
        }

        document.getElementById('dbWarningBar').classList.add('hidden');

        state.rooms = {};
        state.users = {}; // ★追加
        
        let parsedData = {};
        if (data && data.text)
        {
            try
            {
                parsedData = JSON.parse(data.text);
            } catch(e) {
                console.warn("JSONのパースに失敗。初期化を行います。");
            }
        } else if (data && typeof data === 'object' && !Array.isArray(data)) {
            parsedData = data;
        }

        // --- データの復元 ---
        const roomsData = parsedData.rooms || parsedData;
        if (roomsData && typeof roomsData === 'object' && !Array.isArray(roomsData))
        {
            for (const [roomName, msgs] of Object.entries(roomsData))
            {
                state.rooms[roomName] = Array.isArray(msgs) ? msgs : [];
            }
        }

        // ★追加: users オブジェクトの復元
        if (parsedData.users && typeof parsedData.users === 'object' && !Array.isArray(parsedData.users))
        {
            state.users = parsedData.users;

            // ★ここに追加！データが届いたらプルダウンを更新する
            updateUserDropdown();
        }

        // ★追加: 現在のユーザーが未登録なら追加して自動保存
        if (state.user.name && state.user.email)
        {
            let currentUserData = [state.user.email, state.user.notification];

            if (JSON.stringify(state.users[state.user.name]) !== JSON.stringify(currentUserData))
            {
                state.users[state.user.name] = [state.user.email, state.user.notification];
                // バックグラウンドで静かに保存（メッセージは出さない）
                saveAllData('ユーザー情報を更新しました');
            }
        }

        // --- パラメータからの部屋の復元ロジック ---
        const urlRoom = getParams('room');
        const roomKeys = Object.keys(state.rooms);
        if (roomKeys.length > 0)
        {
            if (urlRoom && state.rooms[urlRoom])
            {
                state.currentRoom = urlRoom;
            } else if (!state.currentRoom || !state.rooms[state.currentRoom]) {
                state.currentRoom = roomKeys[0];
            }
        } else {
            state.rooms['メインルーム'] = [];
            state.currentRoom = 'メインルーム';
        }

        setParams(['room', state.currentRoom]);
        renderRooms();
        renderMessages();
        updateSyncStatus(true, '同期完了');
    } catch (error) {
        console.error('通信エラー:', error);
        showToast('データの取得に失敗しました。接続を確認してください。', 'error');
        updateSyncStatus(false, '接続エラー');
    } finally {
        setLoadingState(false);
    }
}

// データ更新 (POSTリクエスト)
async function saveAllData(successMessage = '保存しました')
{
    setLoadingState(true);

    try
    {
        // ★修正: rooms と users を並列で内包するオブジェクトを作る
        const payload = {
            rooms: {},
            users: state.users || {} // ★追加
        };

        for (let [roomName, msgs] of Object.entries(state.rooms))
        {
            payload.rooms[roomName] = Array.isArray(msgs) ? msgs : [];
        }

        const finalBody = {
            text: JSON.stringify(payload, null, 2)
        };

        await fetch(API_URL,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain',
                },
                body: JSON.stringify(finalBody)
            }
        );
        
        showToast(successMessage, 'success');
        updateSyncStatus(true, '保存済み');
    } catch (error) {
        console.error('保存エラー:', error);
        showToast('データの保存に失敗しました。', 'error');
        updateSyncStatus(false, '保存失敗');
    } finally {
        setLoadingState(false);
    }
}

// スレッドリストの描画
function renderRooms()
{
    const roomList = document.getElementById('roomList');
    roomList.innerHTML = '';

    const rooms = Object.keys(state.rooms);
    if (rooms.length === 0)
    {
        roomList.innerHTML = `<div class="text-center p-4 text-slate-500 text-xs">ルームがありません</div>`;
        return;
    }

    rooms.forEach(room =>
        {
            const isSelected = room === state.currentRoom;
            const count = Array.isArray(state.rooms[room]) ? state.rooms[room].length : 0;

            const btn = document.createElement('button');
            btn.onclick = () => selectRoom(room);
            btn.className = `w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${isSelected
                ? 'bg-blue-600/10 text-blue-400 border-l-4 border-blue-500' 
                : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-200'
            }`;

            btn.innerHTML = `<div class="flex items-center space-x-2.5 truncate">
                <span class="material-icons-round text-base shrink-0">${isSelected ? 'chat_bubble' : 'chat_bubble_outline'}</span>
                <span class="truncate">${escapeHtml(room)}</span>
            </div>
            <span class="text-xxs px-1.5 py-0.5 rounded bg-slate-800 text-slate-500 shrink-0 font-normal">${count}</span>`;
            roomList.appendChild(btn);
        }
    );
}

// メッセージの描画
function renderMessages()
{
    const container = document.getElementById('messageContainer');
    container.innerHTML = '';

    const currentTitle = document.getElementById('currentRoomTitle');
    const roomSubInfo = document.getElementById('roomSubInfo');

    if (!state.currentRoom)
    {
        currentTitle.innerText = 'ルームを選択してください';
        roomSubInfo.innerText = '';
        container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 space-y-2">
            <span class="material-icons-round text-4xl">forum</span>
            <p class="text-sm">ルームを選択するか、新規ルームを作成してください。</p>
        </div>`;
        document.getElementById('roomActionButtons').style.display = 'none';
        return;
    }

    document.getElementById('roomActionButtons').style.display = 'flex';
    currentTitle.innerText = state.currentRoom;

    const rawMessages = state.rooms[state.currentRoom];
    const messages = Array.isArray(rawMessages) ? rawMessages : [];
    roomSubInfo.innerText = `投稿数: ${messages.length}件`;

    if (messages.length === 0)
    {
        container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 space-y-2">
            <span class="material-icons-round text-3xl">chat</span>
            <p class="text-sm">メッセージはまだありません。会話を始めましょう！</p>
        </div>`;
        return;
    }

    messages.forEach(msg =>
        {
            if (!msg)
            {
                return;
            }
 
            const isMe = msg.name === state.user.name;
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'} group w-full mb-4`;

            let quoteHtml = '';
            if (msg.quote)
            {
                quoteHtml = `<div class="mb-2 p-2 bg-slate-50 border-l-4 border-slate-400 rounded text-xs text-slate-600 italic">
                    <span class="font-bold block text-[10px] text-slate-500">${escapeHtml(msg.quote.author)}:</span>
                    ${escapeHtml(msg.quote.text)}
                </div>`;
            }

            const msgContent = `<div class="max-w-[85%] md:max-w-2xl flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                <div class="flex items-center space-x-2 mb-1">
                    <span class="text-xs font-semibold text-slate-600">${escapeHtml(msg.name)}</span>
                    <span class="text-[10px] text-slate-400">${escapeHtml(msg.time || '')}</span>
                </div>

                <div class="relative ${isMe 
                    ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none shadow-sm' 
                    : 'bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none shadow-sm'} px-4 py-3 text-sm">
                    ${quoteHtml}
                    <div class="whitespace-pre-wrap break-all leading-relaxed">${escapeHtml(msg.text)}</div>
                    <div class="absolute ${isMe ? 'left-0 -translate-x-[110%]' : 'right-0 translate-x-[110%]'} top-1/2 -translate-y-1/2 flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white border border-slate-200 shadow-md rounded-lg p-1 z-10">
                        <button onclick="quoteMessage('${escapeHtml(msg.name)}', '${escapeHtml(msg.text.replace(/'/g, "\\'"))}')" class="p-1 text-slate-500 hover:text-blue-600 rounded hover:bg-slate-100" title="引用">
                            <span class="material-icons-round text-sm">reply</span>
                        </button>
                        <button onclick="copyMessageText('${escapeHtml(msg.text.replace(/'/g, "\\'"))}')" class="p-1 text-slate-500 hover:text-emerald-600 rounded hover:bg-slate-100" title="コピー">
                            <span class="material-icons-round text-sm">content_copy</span>
                        </button>
                        ${isMe ? `
                            <button onclick="openEditMessageModal('${msg.id}', '${escapeHtml(msg.text.replace(/'/g, "\\'"))}')" class="p-1 text-slate-500 hover:text-indigo-600 rounded hover:bg-slate-100" title="編集">
                                <span class="material-icons-round text-sm">edit</span>
                            </button>
                            <button onclick="deleteMessage('${msg.id}')" class="p-1 text-slate-500 hover:text-red-600 rounded hover:bg-slate-100" title="削除">
                                <span class="material-icons-round text-sm">delete</span>
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>`;

            msgDiv.innerHTML = msgContent;
            container.appendChild(msgDiv);
        }
    );

    container.scrollTop = container.scrollHeight;
}

// --- メッセージ操作 ---

// 1. 新規投稿
function handleSendMessage(e)
{
    if (e)
    {
        e.preventDefault();
    }

    const input = document.getElementById('messageInput');
    const text = input.value.trim();

    if (!text)
    {
        return;
    }

    if (!state.currentRoom)
    {
        showToast('ルームを選択してください', 'error');
        return;
    }

    const now = new Date();
    let year = now.getFullYear();
    let month = (now.getMonth() + 1).toString().padStart(2, '0');
    let date = now.getDate().toString().padStart(2, '0');
    let hour = now.getHours().toString().padStart(2, '0');
    let min = now.getMinutes().toString().padStart(2, '0');
    const timeStr = `${year}/${month}/${date} ${hour}:${min}`;

    const newMessage = {
        id: 'msg_' + Date.now(),
        name: state.user.name,
        text: text,
        time: timeStr,
        quote: state.quoteState
    };

    if (!Array.isArray(state.rooms[state.currentRoom]))
    {
        state.rooms[state.currentRoom] = [];
    }
    state.rooms[state.currentRoom].push(newMessage);

    clearQuote();
    input.value = '';
    input.style.height = 'auto';

    renderMessages();
    renderRooms(); 

    saveAllData('メッセージを送信しました');

    sendEmailNotifications(text);
}

{
    state.quoteState = { author, text };
    const container = document.getElementById('quoteContainer');
    document.getElementById('quoteAuthor').innerText = `${author}:`;

{
    const tempTextarea = document.createElement('textarea');
    tempTextarea.value = text;
    document.body.appendChild(tempTextarea);
    tempTextarea.select();

    try
    {
        document.execCommand('copy');
        showToast('メッセージをクリップボードにコピーしました', 'success');
    } catch (err) {
        showToast('コピーに失敗しました', 'error');
    }

}

function openCreateThreadModal()
{

        {
            const newName = value.trim();
            if (!newName)
            {
                showToast('ルーム名を入力してください', 'error');
                return;
            }

            if (state.rooms[newName])
            {
                showToast('すでに同じ名前のルームが存在します', 'error');

            }

            state.currentRoom = newName;

            setParams(['room', newName]);

            closeThreadModal();
            renderRooms();
            renderMessages();
            saveAllData(`ルーム「${newName}」を作成しました`);
        }
    );
}

// B. スレッドの複製
function openDuplicateThreadModal()
{
    if (!state.currentRoom)
    {
        return;
    }

    const originName = state.currentRoom;
    openThreadModal('ルームの複製', '複製先のルーム名を入力してください', originName, function(value)
        {
            const newName = value.trim();

            if (!newName)
            {
                showToast('ルーム名を入力してください', 'error');
                return;
            }

            if (state.rooms[newName])
            {
                showToast('すでに存在するルーム名です', 'error');
                return;
            }

            const originalMessages = Array.isArray(state.rooms[originName]) ? state.rooms[originName] : [];
            state.rooms[newName] = JSON.parse(JSON.stringify(originalMessages));
            state.currentRoom = newName;
            setParams(['room', newName]);
            closeThreadModal();
            renderRooms();
            renderMessages();
            saveAllData(`ルーム「${originName}」を「${newName}」に複製しました`);
        }
    );
}

                return;
            }

            if (newName === originName)
            {
                closeThreadModal();
                return;
            }

            if (state.rooms[newName])
            {
                showToast('すでに存在するルーム名です', 'error');
                return;
            }

            state.rooms[newName] = Array.isArray(state.rooms[originName]) ? state.rooms[originName] : [];
            delete state.rooms[originName];
            state.currentRoom = newName;
            setParams(['room', newName]);
            closeThreadModal();
            renderRooms();
            renderMessages();
            saveAllData(`ルーム名を「${newName}」に変更しました`);
        }
    );
}

// D. スレッドの削除
function deleteThread()
{
    if (!state.currentRoom)
    {
        return;
    }

    const name = state.currentRoom;
    if (confirm(`ルーム「${name}」を完全に削除しますか？\n（この操作は元に戻せません。メッセージもすべて消去されます）`))
    {
        delete state.rooms[name];

        const keys = Object.keys(state.rooms);
        if (keys.length > 0)
        {
            state.currentRoom = keys[0];
        } else {
            state.rooms['メインルーム'] = [];
            state.currentRoom = 'メインルーム';
        }

        setParams(['room', state.currentRoom]);
        renderRooms();
        renderMessages();
        saveAllData(`ルーム「${name}」を削除しました`);
    }
}

function openThreadModal(title, label, value, submitCallback)
{

{

// --- トースト・ユーティリティ ---

function showToast(message, type = 'info')
{
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');

    let bgClass = 'bg-slate-800 text-white';
    let icon = 'info';

    if (type === 'success')
    {
        bgClass = 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/10';
        icon = 'check_circle';
    } else if (type === 'error') {
        bgClass = 'bg-red-600 text-white shadow-lg shadow-red-500/10';
        icon = 'error';
    } else if (type === 'info') {
        bgClass = 'bg-blue-600 text-white shadow-lg shadow-blue-500/10';
        icon = 'info_outline';
    }

    toast.className = `flex items-center space-x-3 px-4 py-3 rounded-xl shadow-lg text-sm pointer-events-auto transform translate-y-2 opacity-0 transition-all duration-300 ${bgClass}`;
    toast.innerHTML = `
        <span class="material-icons-round text-lg shrink-0">${icon}</span>
        <span class="font-medium">${message}</span>
    `;

    container.appendChild(toast);

    setTimeout(
        () => {
            toast.classList.remove('translate-y-2', 'opacity-0');
        }, 50
    );

    setTimeout(
        () => {
            toast.classList.add('opacity-0', 'translate-y-1');
            setTimeout(
                () => {
                    toast.remove();
                }, 300
            );
        }, 3500
    );
}

// 新着メッセージを「通知ON」のユーザーにメール送信する関数
async function sendEmailNotifications(newMessageText)
{
    const GMAIL_API_URL = 'https://script.google.com/macros/s/AKfycbznH820ORE-9x_0paeEv0Ir90RWn0fpRrNvlPwtHLnZgmxAsP-5gFV_hp9YoR87IcMh/exec';
    let addressList = [];

    // state.users から通知がON（true）のユーザーを抽出してメールを送信
    for (const [username, userData] of Object.entries(state.users))
    {
        const [email, isNotifOn] = userData;

        // 自分以外の「通知ON」ユーザーに送る場合
        // 自分にも送るなら `username !== state.user.name` の条件を外す
        if (isNotifOn && email && username !== state.user.name)
        {
            addressList.push(email);
        }
    }

    if (addressList.length === 0)
    {
        return;
    }

    let address = addressList.join(', ');

    let params = new URLSearchParams();
    params.append('to', address);
    params.append('subject', `【チャット】${state.user.name} さんから新着メッセージ`);
    params.append('htmlText', `<div style="font-family: sans-serif; color: #333; padding: 20px; max-width: 600px; border: 1px solid #e2e8f0; rounded-radius: 12px;">
        <h2 style="color: #2563eb; font-size: 18px; margin-bottom: 10px;"># ${state.currentRoom} に新しい投稿があります</h2>
        <p style="font-size: 12px; color: #64748b;">
            <span>発言者:</span>
            <b>${state.user.name}</b>
        </p>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
        <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; font-size: 14px; white-space: pre-wrap;">${escapeHtml(newMessageText)}</div>
        <br>
        <a href="${window.location.href}" style="display: inline-block; background-color: #2563eb; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: bold;">チャットを開く</a>
    </div>`);

    try
    {
        // Gmail送信用API（doPost）を実行
        await fetch(GMAIL_API_URL,
            {
                method: 'POST',
                mode: 'no-cors', // GASへの簡易POST用
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }
        );

        console.log(`${addressList.length} 人に通知メールを送信しました。`);
    } catch (err) {
        console.error('メール通知エラー:', err);
    }
}

function a()
{
    fetchData();
    setTimeout(a, 15000);
}

function escapeHtml(str)
{
    if (typeof str !== 'string') return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}
