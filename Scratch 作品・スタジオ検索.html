<html lang="ja"><head><base target="_blank">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0;">
    <title>Scratch 作品・スタジオ検索</title><style>
        body
        {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
            font-size: 30px;
        }

        .container
        {
            margin-top: 50px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: inline-block;
            background-color: #f9f9f9;
            width: 80%;
        }

        input[type="text"]
        {
            padding: 0px;
            margin: 0px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 30px;
            text-align: center;
            width: 100%;
            height: 60px;
        }

        button
        {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 30px;
        }

        button:hover
        {
            background-color: #0056b3;
        }

        #message
        {
            color: red;
            margin-top: 15px;
        }

        #select
        {
            width: 120px;
            height: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Scratch 作品・スタジオ検索</h2>
        <p>Scratch の検索ページを開きます。</p>

        <input type="text" id="ScratchSearchInput" placeholder="Scratch の作品・スタジオを検索" onkeypress="handleKeyPress(event)">

        <p>
            <u>作品</u>
            <span>または</span>
            <u>スタジオ</u>
            <select id="select">
                <option value="projects" selected="">作品</option>
                <option value="studios">スタジオ</option>
            </select>
        </p>

        <p></p>
        <button onclick="search()">検索</button>
        <p id="message"></p>
    </div>

    <script>
        function search()
        {
            var ScratchSearch = document.getElementById('ScratchSearchInput').value.trim();
            var messageElement = document.getElementById('message');
            var selected = document.getElementById('select');

            if (ScratchSearch) {
                var baseURL = "https://scratch.mit.edu/search/";
                var baseURL2 = "?q=";
                var URL = baseURL + selected.value + baseURL2 + ScratchSearch;

                // 新しいタブで開く
                window.open(URL, '_blank');
                messageElement.textContent = ""; // エラーメッセージをクリア
            } else {
                messageElement.textContent = "ユーザー名を入力してください。";
            }
        }

        // Enterキーが押されたかを判定する関数
        function handleKeyPress(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                search();
            }
        }
    </script>

</body></html>
