<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>新しくないタブ</title>
<style>
html
{
    width: 100%;
    height: 100%;
}

body
{
    margin: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    overflow: auto;
}

main
{
    padding: 20px;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    text-align: center;
}

img#Goggle
{
    zoom: 150%;
    margin-top: 40px;
    margin-bottom: 40px;
}

img#searchMark
{
    zoom: 80%;
    padding: 12px;
    overflow: auto;
    cursor: pointer;
}

input[type="text"]
{
    zoom: 200%;
    width: 300px;
    border: 0px;
    padding: 5px;
    background-color: transparent;
}

input[type="text"]:focus
{
    outline: none;
}

p#inputGroup
{
    display: flex;
    width: 672px;
    box-shadow: 0 1px 6px 0 rgba(34, 34, 34, 30%);
    border-radius: 999px;
    padding: 5px;
    margin-left: calc(50% - 336px);
    margin-right: calc(50% - 336px);
    z-index: 1000;
    position: relative;
    background-color: white;
}

h1#errorMessage
{
    margin: 20px 0px;
    font-size: 60px;
}

.rotate
{
    transform: rotateZ(180deg);
}
</style>
</head>
<body onload="onLoad()">
<div style="position: absolute;">
    <span>自動回転</span>
    <input type="checkbox" id="checkbox">
</div>
<main>
    <img id="Goggle" src="https://e24028.github.io/Goggle.svg" title="Goggle">
    <p id="inputGroup" onkeypress="enterKey(event)" title="検索">
        <img id="searchMark" src="https://e24028.github.io/検索マーク.svg" onclick="search()" title="検索マーク">
        <input type="text" id="search" oninput="onInput()" placeholder="Goggle で検索または URL を入力">
    </p>
    <h1 id="errorMessage"></h1>
</main>
<script src="https://e24028.github.io/URL操作.js"></script>
<script>
// let body = document.querySelector('body');
let searchInput = document.getElementById('search');
let searchMark = document.getElementById('searchMark');
let errorMessage = document.getElementById('errorMessage');
let inputGroup = document.getElementById('inputGroup');
let checkbox = document.getElementById('checkbox');

function onLoad()
{
    searchInput.value = getParams('q') || '';
    checkbox.checker = (getParams('auto') === 'true') ? true : false;
    toggleAuto();
}

function toggleAuto()
{
    if (checkbox.checked)
    {
        searchMark.click();
    }

    setTimeout(autoClick, 200);
}

function onInput()
{
    setParams(['q', searchInput.value]);
}

function enterKey(e)
{
    if (e.key === 'Enter' || e.keyCode === 13)
    {
        search();
    }
}

function search()
{
    setTimeout(Rotate, 10, 0);

    if (!searchInput.value)
    {
        errorMessage.innerText = '検索を入力してください。';
        errorMessage.style.color = 'red';
        return;
    }

    errorMessage.innerText = '';

    // errorMessage.innerText = '読み込み中...';
    // errorMessage.style.color = 'black';

    // setTimeout((function() {
        // errorMessage.innerText = 'エラー404：リダイレクトが未実装です。';
        // errorMessage.style.color = 'red';
    // }), 1000);
}

function Rotate(i)
{
    let rotates = Number(inputGroup.style.transform.replace(/rotate\(/g, '').replace(/deg\)/g, ''));

    if (i < 100)
    {
        inputGroup.style.transform = `rotate(${rotates + 5}deg)`;   
        setTimeout(Rotate, 5, i + 1);
    } else {
        // 回転数の調整処理
        rotates = (rotates + 180) % 360 - 180;
        inputGroup.style.transform = `rotate(${rotates}deg)`;
    }
}
</script>
</body>
</html>
