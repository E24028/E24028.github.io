<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>新しくないタブ</title>
<style>
html
{
    width: 100%;
    height: 100%;
}

body
{
    margin: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    overflow: auto;
}

main
{
    padding: 20px;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    text-align: center;
}

img#Goggle
{
    zoom: 150%;
    margin-top: 50px;
    margin-bottom: 50px;
}

img#searchMark
{
    zoom: 80%;
    padding: 12px;
    overflow: auto;
    cursor: pointer;
}

input[type="text"]
{
    zoom: 200%;
    width: 300px;
    border: 0px;
    padding: 5px;
    background-color: transparent;
}

input[type="text"]:focus
{
    outline: none;
}

p#inputGroup
{
    display: flex;
    width: 672px;
    box-shadow: 0px 0px 10px rgb(30, 30, 30);
    border-radius: 999px;
    padding: 5px;
    margin-left: calc(50% - 350px);
    margin-right: calc(50% - 350px);
}

h1#errorMessage
{
    margin: 20px 0px;
    font-size: 60px;
}
</style>
</head>
<body onload="onLoad()">
<main>
    <img id="Goggle" src="https://e24028.github.io/Goggle.svg" title="Goggle">
    <p id="inputGroup" onkeypress="enterKey(event)" title="検索">
        <img id="searchMark" src="https://e24028.github.io/検索マーク.svg" onclick="search()">
        <input type="text" id="search" oninput="onInput()" placeholder="Goggle で検索または URL を入力">
    </p>
    <h1 id="errorMessage"></h1>
</main>
<script src="https://e24028.github.io/URL操作.js"></script>
<script>
let searchInput = document.getElementById('search');
let errorMessage = document.getElementById('errorMessage');

function onLoad()
{
    searchInput.value = getParams('q') || '';
}

function onInput()
{
    setParams(['q', searchInput.value]);
}

function enterKey(e)
{
    if (e.key === 'Enter' || e.keyCode === 13)
    {
        search();
    }
}

function search()
{
    if (!searchInput.value)
    {
        errorMessage.innerText = '検索を入力してください。';
        errorMessage.style.color = 'red';
        return;
    }

    errorMessage.innerText = '読み込み中...';
    errorMessage.style.color = 'black';

    setTimeout((function() {
        errorMessage.innerText = 'エラー404：リダイレクトが未実装です。';
        errorMessage.style.color = 'red';
    }), 1000);
}
</script>
</body>
</html>
