<!DOCTYPE html>
<html>
  <head>
    <title>Gemini Nano テスター</title>
  </head>
  <body>
    <h1>Gemini Nano テスター</h1>
    <p>こちらにプロンプトを入力</p>
    <textarea class="user-input"></textarea>
    <p>画像も添付できます</p>
    <input type="file" accept="image/*" class="user-input"></input>
    <br>
    <hr>
    <br>
    <p>返答</p>
    <div id="ai-res"></div>
    <button id="reset-area">リセット</button>
  </body>
  <script>
    // 要素の取得
const textarea = document.querySelector('textarea');
const fileInput = document.querySelector('input[type="file"][accept="image/*"], .user-input');
const aiRes = document.getElementById('ai-res');
const sendBtn = document.getElementById('ai-send'); // 送信ボタンを追加
const resetBtn = document.getElementById('reset-area');

// Gemini Nanoのセッション管理用変数
let aiSession = null;

// 画像をBase64またはBlob形式に変換するヘルパー関数
async function fileToGenerativePart(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      resolve({
        inlineData: {
          data: reader.result.split(',')[1],
          mimeType: file.type
        },
      });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// AIへの送信と返答の表示処理
async function sendToGeminiNano() {
  // window.ai がサポートされているか確認
  if (!window.ai || !window.ai.assistant) {
    aiRes.textContent = "お使いのブラウザはGemini Nano（Prompt API）をサポートしていないか、有効になっていません。";
    return;
  }

  const text = textarea.value.trim();
  const file = fileInput.files[0];

  if (!text && !file) {
    aiRes.textContent = "テキストを入力するか、画像を選択してください。";
    return;
  }

  try {
    aiRes.textContent = "思考中...";

    // セッションの作成
    if (!aiSession) {
      aiSession = await window.ai.assistant.create();
    }

    // プロンプトの構築
    let promptArgs = [];
    if (file) {
      const imagePart = await fileToGenerativePart(file);
      promptArgs.push(imagePart);
    }
    if (text) {
      promptArgs.push(text);
    }

    // Gemini Nanoに送信（ストリーミング表示）
    const stream = aiSession.promptStreaming(promptArgs);
    
    aiRes.textContent = ""; 
    for await (const chunk of stream) {
      aiRes.textContent = chunk;
    }

  } catch (error) {
    console.error("Gemini Nano Error:", error);
    aiRes.textContent = `エラーが発生しました: ${error.message}`;
  }
}

// リセット処理
function resetAll() {
  textarea.value = "";
  fileInput.value = "";
  aiRes.textContent = "";
  
  if (aiSession) {
    aiSession.destroy();
    aiSession = null;
  }
}

// --- イベントリスナーの登録 ---

// 1. 送信ボタンがクリックされたとき
if (sendBtn) {
  sendBtn.addEventListener('click', sendToGeminiNano);
}

// 2. テキストエリアで Ctrl + Enter が押されたとき（キーボード操作用）
textarea.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    sendToGeminiNano();
  }
});

// 3. リセットボタンがクリックされたとき
if (resetBtn) {
  resetBtn.addEventListener('click', resetAll);
}
  </script>
</html>
