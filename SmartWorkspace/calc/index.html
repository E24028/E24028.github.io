<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Workspace - 暗算ソフト</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://e24028.github.io/URL操作.js"></script>
<script src="https://e24028.github.io/Random.js"></script>
<style>
::-webkit-scrollbar
{
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track
{
    background: transparent;
}

::-webkit-scrollbar-thumb
{
    background: rgba(156, 163, 175, 0.5);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover
{
    background: rgba(107, 114, 128, 0.7);
}

.material-icons-round
{
    user-select: none !important;
}

a.outerURL
{
    text-decoration: underline !important;
}

body
{
    overflow: auto !important;
}
</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" onload="onLoad()">

<div class="flex flex-1 overflow-hidden relative">
    <aside id="sidebar" class="w-80 bg-slate-900 text-slate-300 flex flex-col border-r border-slate-800 transition-all duration-300 md:relative absolute z-40 h-full -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <span class="material-icons-round">calculate</span>
                </div>
                <span class="font-bold text-white text-lg tracking-wide">Smart Workspace</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white">
                <span class="material-icons-round">close</span>
            </button>
        </div>

        <div class="p-4 bg-slate-950/40 border-b border-slate-800/80 flex flex-col space-y-2">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3 overflow-hidden">
                    <div class="w-8 h-8 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-sm font-bold shrink-0" id="userAvatar">U</div>
                    <div class="truncate">
                        <p class="text-sm font-semibold text-white truncate" id="currentUsername">ゲストユーザー</p>
                        <p class="text-xs text-slate-400 truncate" id="currentUserEmail">未登録</p>
                    </div>
                </div>
                <div class="flex items-center space-x-1">
                    <button onclick="logout()" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-red-400 transition-all" title="ログアウト">
                        <span class="material-icons-round text-lg">logout</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-1">
            <button onclick="goBack()" class="w-full flex items-center space-x-2.5 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition-all">
                <span class="material-icons-round text-base">arrow_back</span>
                <span>ホームへ戻る</span>
            </button>
        </div>

        <div class="p-3 bg-slate-950/20 border-t border-slate-800/60 text-xs text-slate-500 flex items-center justify-between">
            <span class="flex items-center gap-1">
                <span id="syncIndicator" class="inline-block w-2 h-2 rounded-full bg-slate-600"></span>
                <span id="syncText">未接続</span>
            </span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-y-auto">
        <header class="bg-white border-b border-slate-200 h-16 px-6 flex items-center justify-between shrink-0 sticky top-0 z-30">
            <div class="flex items-center space-x-3 min-w-0">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
                    <span class="material-icons-round">menu</span>
                </button>
                <h1 class="font-bold text-slate-800 text-lg">暗算トレーニング</h1>
            </div>
            <button onclick="goBack()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl text-sm transition-all flex items-center space-x-1">
                <span class="material-icons-round text-sm">exit_to_app</span>
                <span>戻る (終了)</span>
            </button>
        </header>

        <div class="p-6 max-w-2xl w-full mx-auto space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm text-center">
                    <p class="text-xs text-slate-400 font-semibold uppercase">現在のスコア</p>
                    <p class="text-2xl font-bold text-blue-600 mt-1" id="scoreDisplay">---</p>
                </div>
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm text-center">
                    <p class="text-xs text-slate-400 font-semibold uppercase">ランク</p>
                    <p class="text-lg font-bold text-slate-700 mt-1" id="rankDisplay">---</p>
                </div>
                <!--<div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm text-center">-->
                    <!--<p class="text-xs text-slate-400 font-semibold uppercase">正解難易度 / 総難易度</p>-->
                    <!--<p class="text-lg font-bold text-slate-700 mt-1" id="difficultyRatio">---</p>-->
                <!--</div>-->
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm text-center">
                    <p class="text-xs text-slate-400 font-semibold uppercase">総プレイ時間</p>
                    <p class="text-lg font-bold text-slate-700 mt-1"><span id="timeDisplay">---</span> 秒</p>
                </div>
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm text-center">
                    <p class="text-xs text-slate-400 font-semibold uppercase">現在のプレイ時間</p>
                    <p class="text-lg font-bold text-slate-700 mt-1"><span id="currentTimeDisplay">---</span> 秒</p>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-md text-center space-y-6 relative overflow-hidden">
                <div class="absolute top-4 right-6 bg-slate-100 text-slate-600 text-xs font-semibold px-3 py-1.5 rounded-full" id="questionDifficulty">
                    難易度: ---
                </div>

                <div class="py-8">
                    <div class="text-5xl md:text-6xl font-extrabold tracking-tight text-slate-800 select-none" id="questionDisplay">
                        準備完了
                    </div>
                </div>

                <div class="max-w-xs mx-auto space-y-4">
                    <div id="inputArea" class="hidden">
                        <input type="number" id="answerInput" class="w-full text-center px-4 py-3 text-2xl border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all font-bold" placeholder="答えを入力" onkeydown="onAnswerKeyDown(event)">
                    </div>

                    <div class="flex gap-3">
                        <button id="mainBtn" onclick="handleMainAction()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/10 hover:shadow-blue-500/20 transition-all flex items-center justify-center space-x-2">
                            <span class="material-icons-round" id="mainBtnIcon">play_arrow</span>
                            <span id="mainBtnText">START</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="toastContainer" class="fixed bottom-6 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-sm"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw9HNyXA1v8FhPQHQulED5OqrUTuiUTymUeKde_-H-0A4UPfTCtcHvm6Csvj6JqjVP7/exec?docId=13c310_cji5gSp30eX0-Kq2hCCSRdROdYjaveZhFYLDE';

let state = {
    user: { name: '', email: '' },
    users: {},
    rooms: {}
};

// ゲーム内のローカル進行状態
let game = {
    isPlaying: false,
    numA: 0,
    numB: 0,
    currentDiff: 0,
    currentTime: 0,
    totalTime: 0,
    timerInterval: null,
    questionStartTime: null,
    isWaitingNext: false,
    score: 0
};

function onLoad()
{
    const savedUser = localStorage.getItem('chat_user');

    if (!savedUser)
    {
        redirectToLogin();
        return;
    }

    try
    {
        const parsed = JSON.parse(savedUser);

        if (parsed.name && parsed.email)
        {
            state.user.name = parsed.name;
            state.user.email = parsed.email;

            document.getElementById('currentUsername').innerText = state.user.name;
            document.getElementById('currentUserEmail').innerText = state.user.email;
            document.getElementById('userAvatar').innerText = state.user.name.charAt(0).toUpperCase();
            
            fetchData();
        } else {
            redirectToLogin();
        }
    } catch (e) {
        redirectToLogin();
    }
}

function redirectToLogin()
{
    setParams(['redirectTo', 'calc']);
    history.replaceState('', null, location.href.replace(/\/calc\//g, '/login/'));
    setTimeout((function() { location.reload(); }), 800);
}

function logout()
{
    if (confirm('ログアウトしますか？'))
    {
        localStorage.removeItem('chat_user');
        redirectToLogin();
    }
}

function goBack()
{
    if (game.isPlaying)
    {
        clearInterval(game.timerInterval);
    }

    history.replaceState('', null, location.href.replace(/\/calc\//g, '/home/'));
    setTimeout((function() { location.reload(); }), 800);
}

// データベースサーバーからデータを同期
async function fetchData()
{
    updateSyncStatus(false, '同期中...');

    try
    {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error();
        const data = await response.json();

        let parsedData = data && data.text ? JSON.parse(data.text) : (data || {});
        state.rooms = parsedData.rooms || {};
        state.users = parsedData.users || {};

        // サーバー上に該当ユーザーの進捗配列 [正解難易度累計, 総難易度累計, 総時間累計] が未保存であれば初期化
        if (state.users[state.user.name])
        {
            if (!Array.isArray(state.users[state.user.name][2]))
            {
                state.users[state.user.name][2] = [0, 0];
            }
            // 既存のサーバー保存データから前回の進捗を復元して初期表示
            const progress = state.users[state.user.name][2];
            game.score = progress[0] || 0;
            game.totalTime = progress[1] || 0;
            updateScoreUI();
        }

        updateSyncStatus(true, '同期完了');
    } catch (error) {
        updateSyncStatus(false, '接続エラー');
        showToast('データの読み込みに失敗しました。', 'error');
    }
}

// サーバーセーブ処理（安全版）
async function saveAllData()
{
    updateSyncStatus(false, '最新データ取得中...');

    try
    {
        // 1. まずサーバーから最新のデータを【完全に待機して】取得する
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('データ取得失敗');
        const data = await response.json();
        
        let parsedData = data && data.text ? JSON.parse(data.text) : (data || {});
        
        // 2. サーバー上の最新のroomsとusersをベースにする（他人のチャットや進捗を壊さないため）
        state.rooms = parsedData.rooms || {};
        state.users = parsedData.users || {};

        // 3. 自分の暗算スコアデータだけをそこに上書きする
        if (!state.users[state.user.name])
        {
            state.users[state.user.name] = [state.user.email, state.users[state.user.name][1], [0, 0]];
        }

        state.users[state.user.name][2] = [game.score, game.totalTime]; // toFixed(2);

        // 4. 最新化されたデータを使ってセーブを実行する
        updateSyncStatus(false, '保存中...');

        const payload = {
            rooms: state.rooms,
            users: state.users
        };

        const finalBody = {
            text: JSON.stringify(payload, null, 2)
        };

        await fetch(API_URL,
            {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(finalBody)
            }
        );
        
        updateSyncStatus(true, '同期完了');
    } catch (error) {
        updateSyncStatus(false, '保存失敗');
        showToast('データの同期・保存に失敗しました。', 'error');
        console.error(error);
    }
}

function updateSyncStatus(isOk, text)
{
    document.getElementById('syncText').innerText = text;
    document.getElementById('syncIndicator').className =
        isOk ? 'inline-block w-2 h-2 rounded-full bg-emerald-500'
        : 'inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse';
}

// 難易度計算ロジック
function calculateSingleDifficulty(num)
{
    let diff = 0;

    if (num >= 2 && num <= 9)
    {
        diff += 2;
    } else if (num >= 11 && num <= 49) {
        diff += 5;
    } else if (num >= 50 && num <= 99) {
        diff += 10;
    }
    
    if (num % 10 === 0)
    {
        diff -= 2;
    }

    if (num % 10 === 5)
    {
        diff -= 1;
    }

    return diff;
}

function calculateDifficulty(a, b)
{
    return calculateSingleDifficulty(a) * calculateSingleDifficulty(b);
}

// メインのアクション処理（スタート、判定、次へ）
function handleMainAction()
{
    if (!game.isPlaying)
    {
        document.getElementById('questionDisplay').innerText = '読み込み中...';
        document.getElementById('mainBtn').disabled = true;
        setTimeout(
            (
                function() {
                    // スタート
                    document.getElementById('mainBtn').disabled = false;
                    document.getElementById('questionDisplay').innerText = '';
                    game.isPlaying = true;
                    document.getElementById('inputArea').classList.remove('hidden');
                    nextQuestion();
                }
            ), 3000
        );
    } else if (game.isWaitingNext) {
        // 次の問題へ
        nextQuestion();
    } else {
        // 回答をチェックする
        checkAnswer();
    }
}

function nextQuestion()
{
    game.isWaitingNext = false;
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('answerInput').focus();

    // 2～99 のランダム数を取得 (Random.js の getRandom(min, max) 使用)
    game.numA = getRandom(2, 99);
    game.numB = getRandom(2, 99);
    game.currentDiff = calculateDifficulty(game.numA, game.numB);

    // UI更新
    document.getElementById('questionDisplay').innerText = `${game.numA} × ${game.numB}`;
    document.getElementById('questionDifficulty').innerText = `難易度: ${game.currentDiff}`;

    // ボタン表示を「判定」へ
    setMainButton('check', '判定する');

    // 時間計測開始
    game.questionStartTime = performance.now();

    if (game.timerInterval)
    {
        clearInterval(game.timerInterval);
    }

    game.timerInterval = setInterval(updateTimer, 10);
}

function updateTimer()
{
    if (!game.questionStartTime)
    {
        return;
    }

    const elapsedSinceQuestion = (performance.now() - game.questionStartTime) / 1000;
    const dispTime = game.totalTime + elapsedSinceQuestion;
    game.currentTime = elapsedSinceQuestion;
    document.getElementById('timeDisplay').innerText = dispTime.toFixed(2);
    document.getElementById('currentTimeDisplay').innerText = game.currentTime.toFixed(2);
}

function checkAnswer()
{
    clearInterval(game.timerInterval);
    const elapsedSec = (performance.now() - game.questionStartTime) / 1000;
    game.totalTime += elapsedSec;

    const inputVal = parseInt(document.getElementById('answerInput').value, 10);
    const correctAnswer = game.numA * game.numB;

    document.getElementById('answerInput').disabled = true;

    if (inputVal === correctAnswer)
    {
        let scoreB = (game.currentDiff / game.currentTime * 10).toFixed(3);
        showToast(`正解！ (+スコア ${scoreB})`, 'success');
        document.getElementById('questionDisplay').innerHTML = `<span class="text-emerald-500">○ 正解 !</span><br><span class="text-3xl text-slate-500">${game.numA} × ${game.numB} = ${correctAnswer}</span>`;
    } else {
        showToast('不正解...', 'error');
        document.getElementById('questionDisplay').innerHTML = `<span class="text-red-500">× 不正解</span><br><span class="text-3xl text-slate-500">正解: ${correctAnswer}</span>`;
    }

    // スコア計算・反映 & サーバーセーブ
    updateScoreUI(inputVal === correctAnswer);
    saveAllData();

    // 次へボタンへの変更
    game.isWaitingNext = true;
    setMainButton('arrow_forward', '次へ');
    document.getElementById('mainBtn').focus();
}

function updateScoreUI(collect)
{
    // スコア = 難易度 ÷ 時間[s]
    let score = game.score;

    if (collect)
    {
        // score = (game.correctDiffSum / game.totalDiffSum) / game.totalTime * 1000;
        // score = (game.correctDiffSum) / game.totalTime * 10;
        score += game.currentDiff / game.currentTime * 100;
    }

    game.score = score;

    document.getElementById('scoreDisplay').innerText = score.toFixed(3);
    // document.getElementById('difficultyRatio').innerText = `${game.correctDiffSum} / ${game.totalDiffSum}`;
    document.getElementById('timeDisplay').innerText = game.totalTime.toFixed(2);

    if (score < 100) rank = 'F';
    if (score < 300) rank = 'E';
    if (score < 1000) rank = 'D';
    if (score < 3000) rank = 'C';
    if (score > 10000) rank = 'B';
    if (score > 30000) rank = 'A';
    document.getElementById('rankDisplay').innerText = rank;
}

function setMainButton(iconName, text)
{
    document.getElementById('mainBtnIcon').innerText = iconName;
    document.getElementById('mainBtnText').innerText = text;
}

function onAnswerKeyDown(e)
{
    if (e.key === 'Enter')
    {
        e.preventDefault();
        handleMainAction();
    }
}

function toggleSidebar()
{
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
}

function a()
{
    fetchData();
    setTimeout(a, 15000);
}

function showToast(message, type = 'info')
{
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    let bgClass = 'bg-blue-600 text-white';
    let icon = 'info_outline';

    if (type === 'success')
    {
        bgClass = 'bg-emerald-600 text-white';
        icon = 'check_circle_outline';
    } else if (type === 'error') {
        bgClass = 'bg-red-600 text-white';
        icon = 'error_outline';
    }

    toast.className = `flex items-center space-x-3 px-4 py-3 rounded-xl shadow-lg text-sm pointer-events-auto transition-all ${bgClass}`;
    toast.innerHTML = `<span class="material-icons-round text-lg shrink-0">${icon}</span><span class="font-medium">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}
</script>
</body>
</html>
