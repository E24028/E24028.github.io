<!DOCTYPE html>
<html lang="ja">
<head>
<title>構文ハイライトGemini.html</title>
<style>
html, body
{
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* 親でのスクロールを抑制 */
}

* {
    font-size: 20px;
    font-family: monospace; /* 'Consolas', 'Monaco', 'Courier New' */
    tab-size: 4;
    box-sizing: border-box;
}

/* 全体を包むコンテナ */
.editor-container
{
    display: flex;
    width: 100%;
    height: 100%;
    background-color: #eeeeee;
}

/* 行番号エリア */
#lineNumbers
{
    width: 50px;
    height: 100%;
    background-color: #ddd;
    color: #888;
    text-align: right;
    padding-right: 8px;
    padding-top: 8px;
    padding-bottom: 20px;
    user-select: none;
    overflow: hidden; /* スクリプトで同期させる */
    line-height: 1.0; /* 行の高さを固定。1.5 → 1.0 */
}

/* 入力と表示の重なるエリア */
.input-area
{
    position: relative;
    flex-grow: 1;
    height: 100%;
}

#codeInput, #pre
{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 8px;
    border: 0;
    line-height: 1.0; /* 行の高さを統一 */
    white-space: pre;
    overflow: auto;
}

#codeInput
{
    background-color: #eeeeee;
    color: transparent;
    caret-color: black;
    resize: none;
    z-index: 1;
}

#pre
{
    background-color: transparent;
    color: black;
    z-index: 2;
    pointer-events: none;
}

#codeInput::selection
{
    background-color: rgba(127, 191, 255, 50%);
    /* color: white; */
}

a
{
    pointer-events: auto;
    position: relative;
    z-index: 310; /* 佐渡島 */
}

/* 記号の可視化スタイル */
space, tab
{
    display: inline-block;
    pointer-events: none;
}

space::after, tab::after
{
    content: "";
    display: inline-block;
    height: 100px;
    /* vertical-align: middle; */
    /* background-size: contain; */
    /* background-repeat: no-repeat; */
    zoom: 10%;
    opacity: 0.5;
}

space::after
{
    background-image: url("https://E24028.github.io/半角スペース.svg");
    width: 100px; /* フォントサイズに合わせる? */
}

tab::after
{
    background-image: url("https://E24028.github.io/タブ文字.svg");
    width: 400px;
}

full-space::after
{
    content: "☐";
    opacity: 10%;
    width: 20px;
    left: 1px;
    display: inline-block;
    position: relative;
}
</style>
</head>
<body onload="onLoad()">
<div class="editor-container">
    <div id="lineNumbers"></div>

    <div class="input-area">
        <textarea id="codeInput" placeholder="ここにテキストを入力..." oninput="onInput()" onscroll="onScroll()" onkeydown="onKeyDown(event, this)" spellcheck="false"></textarea>
        <pre id="pre"><code id="code"></code></pre>
    </div>
</div>

<script src="https://E24028.github.io/URL操作.js"></script>
<script>
const codeInput = document.getElementById('codeInput');
const code = document.getElementById('code');
const pre = document.getElementById('pre');
const lineNumbers = document.getElementById('lineNumbers');

function onInput()
{
    // タブ入力をスペース4つに変換する処理（必要なら）
    // ※今回は入力された値をそのまま表示に反映させます
    const val = codeInput.value;

    // URLパラメータ保存
    setParams(['data', val]);

    // 1. まずはHTMLエスケープ（基本）※ここではまだスペースは置換しない
    let escaped = val
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')

        // 2. URLのリンク化
        // HTMLエスケープ後なので、半角スペース(' ')、全角スペース(' ')、改行('\n')の手前までをURLとする
        // これにより &amp; はURLに含まれ、半角スペースは含まれません
        .replace(/(https?:\/\/[^ \u3000\n]+)/g,
            (url) => {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            }
        )

        // 3. 改行・タブ・スペースの可視化タグへの置換
        // 💡【工夫】aタグの「中身（テキスト部分）」や「属性（hrefなど）」に含まれるスペースを置換しないよう、
        // aタグ全体（<a ...>...</a>）にマッチした場合はそのまま動かさず、
        // それ以外の場所にあるスペースやタブだけをピンポイントで置換します。
        .replace(/(<a [^>]+>.*?<\/a>)|(    )|( )|(　)/g,
            (match, p1, p2, p3, p4) => {
                if (p1) return p1;          // aタグ全体がマッチした場合は、何もせずそのまま返す
                if (p2) return '<tab></tab>'; // スペース4つはタブに
                if (p3) return '<space></space>'; // 単発の半角スペースはスペースに
                if (p4) return '<full-space></full-space>';
                return match;
            }
        )

        // 4. 改行の置換（aタグを跨ぐことはないので単独処理でOK）
        .replace(/\n/g, '<br>');

    code.innerHTML = escaped;

    updateLineNumbers();
}

function updateLineNumbers()
{
    const lines = codeInput.value.split('\n').length;
    let lineHTML = '';

    for (let i = 1; i <= lines; i++)
    {
        lineHTML += i + '<br>';
    }

    lineNumbers.innerHTML = lineHTML;
}

// スクロールを同期させる
function onScroll()
{
    pre.scrollTop = codeInput.scrollTop;
    pre.scrollLeft = codeInput.scrollLeft;
    lineNumbers.scrollTop = codeInput.scrollTop;
}

function onLoad()
{
    const data = getParams('data');
    if (data) codeInput.value = data;
    onInput();
}

// Tabキーでスペース4つを入力できるようにする
function onKeyDown(e, element)
{
    if (e.key === 'Tab')
    {
        e.preventDefault();
        if (e.shiftKey)
        {
            
        } else {
            const start = element.selectionStart;
            const end = element.selectionEnd;

            // スペース4つを挿入
            element.value = element.value.substring(0, start) + "    " + element.value.substring(end);

            // カーソル位置を戻す
            element.selectionStart = element.selectionEnd = start + 4;
        }

        onInput();
    }
}
</script>
</body>
</html>
